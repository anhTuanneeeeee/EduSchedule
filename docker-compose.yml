version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eduschedule-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=EduSchedule@2026
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/sql:/docker-sql
    networks:
      - eduschedule-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "EduSchedule@2026", "-No", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eduschedule-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./docker/sql:/docker-sql
    networks:
      - eduschedule-network
    command: >
      bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'EduSchedule@2026' -No -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'ScheduleForTeacher') PRINT 'NEED_INIT'\" | grep -q NEED_INIT && /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'EduSchedule@2026' -No -i /docker-sql/init-db.sql || echo 'Database already exists, skipping init.'"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduschedule-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ScheduleForTeacher;User Id=sa;Password=EduSchedule@2026;TrustServerCertificate=True;
      - JwtSettings__SecretKey=ThisIsAVerySecretKeyForEduScheduleProject2026
      - JwtSettings__Issuer=EduScheduleAPI
      - JwtSettings__Audience=EduScheduleClient
      - JwtSettings__ExpiryInMinutes=60
    ports:
      - "8080:8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - eduschedule-network
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: eduschedule-adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - eduschedule-network

volumes:
  sqlserver_data:

networks:
  eduschedule-network:
    driver: bridge
