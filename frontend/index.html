<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSchedule - Login & Registration</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <header>
        <div class="logo">EduSchedule</div>
    </header>

    <main class="container">
        <div class="auth-container glass-card">
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="showTab('login')">Login</div>
                <div class="auth-tab" id="registerTab" onclick="showTab('register')">Register</div>
            </div>

            <div id="authAlert" class="alert"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none;">
                <div class="input-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" required placeholder="johndoe">
                </div>
                <div class="input-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required placeholder="••••••••">
                </div>
                <div class="input-group">
                    <label for="regRole">I am a...</label>
                    <select id="regRole" required>
                        <option value="STUDENT">Student</option>
                        <option value="TEACHER">Teacher</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        function showTab(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (type === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
            }
        }

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            ui.showLoader();
            
            try {
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;

                const response = await api.post('/Auth/login', { email, password });
                
                auth.saveToken(response.token, {
                    userId: response.userId,
                    username: response.username,
                    fullName: response.fullName,
                    roles: response.roles
                });

                // Redirect based on role
                const role = response.roles[0];
                if (role === 'ADMIN') window.location.href = 'admin_semester.html';
                else if (role === 'TEACHER') window.location.href = 'teacher_availability.html';
                else if (role === 'STUDENT') window.location.href = 'student_schedule.html';
                else alert('Role not recognized. Please contact admin.');
            } catch (error) {
                ui.showAlert('authAlert', error.message);
                ui.hideLoader();
            }
        });

        // Register Logic
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            ui.showLoader();

            try {
                const body = {
                    username: document.getElementById('regUsername').value,
                    email: document.getElementById('regEmail').value,
                    fullName: document.getElementById('regFullName').value,
                    password: document.getElementById('regPassword').value,
                    roleCode: document.getElementById('regRole').value
                };

                await api.post('/Auth/register', body);
                ui.showAlert('authAlert', 'Registration successful! Please login.', 'success');
                showTab('login');
                ui.hideLoader();
            } catch (error) {
                ui.showAlert('authAlert', error.message);
                ui.hideLoader();
            }
        });

        // Check if already logged in
        if (auth.isLoggedIn()) {
            const user = auth.getUser();
            if (user.roles.includes('ADMIN')) window.location.href = 'admin_semester.html';
            else if (user.roles.includes('TEACHER')) window.location.href = 'teacher_availability.html';
        }
    </script>
</body>
</html>
